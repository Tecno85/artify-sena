<section class="login-screen">
  <!-- Tarjeta central del login independiente de Angular. -->
  <div class="login-card card">
    <p class="eyebrow">Evidencia Angular</p>
    <h1>Artify Analytics</h1>
    <p class="muted">
      Inicia sesión con el endpoint real de Artify para consultar el dashboard protegido.
    </p>

    <!-- Formulario reactivo que valida datos basicos antes de llamar al backend real. -->
    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <!-- Campo de correo usado por el endpoint POST /api/login. -->
      <label>
        Correo
        <input
          type="email"
          formControlName="correo"
          autocomplete="email"
          placeholder="usuario@artify.com"
        >
      </label>
      <small class="status-error" *ngIf="loginForm.controls.correo.touched && loginForm.controls.correo.invalid">
        Ingresa un correo valido.
      </small>

      <!-- Campo de contrasena requerido para autenticar al usuario en Artify. -->
      <label>
        Contrasena
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Tu contrasena"
        >
      </label>
      <small class="status-error" *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
        La contrasena es obligatoria.
      </small>

      <!-- Mensaje de error proveniente del backend o de un fallo de conexion. -->
      <p class="status-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Validando...' : 'Iniciar sesion' }}
      </button>
    </form>
  </div>
</section>
