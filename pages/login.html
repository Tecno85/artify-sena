<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Artify</title>
    <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg" />
    <link rel="stylesheet" href="./assets/css/login.css" />
  </head>

  <body>
    <!-- Contenedor Principal -->
    <div class="container align">
      <!-- Header - Logo y título de la aplicación -->
      <header class="header align">
        <img src="./assets/images/modx-icon.svg" alt="Logo Artify" />
        <h1>Artify</h1>
        <p>Editor de Imágenes Web</p>
      </header>

      <!-- Main - Formulario de inicio de sesión -->
      <main>
        <form action="">
          <!-- Correo electrónico -->
          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="editor@gmail.com"
              required
            />
          </div>

          <!-- Contraseña con toggle de visibilidad-->
          <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-wrapper">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="1234567890"
                required
              />
              <img
                src="../assets/icons/eye.svg"
                alt="Mostrar contraseña"
                class="eye-icon"
              />
            </div>
          </div>
        </form>

        <!-- Botón de acción -->
        <button type="submit">Iniciar Sesión</button>
      </main>

      <!-- Footer -  Enlaces de ayuda y registro -->
      <footer class="align">
        <p><a href="#">¿Olvidaste tu contraseña?</a></p>
        <p><a href="./pages/registro.html">Crear cuenta</a></p>
      </footer>
    </div>
  </body>
</html>
