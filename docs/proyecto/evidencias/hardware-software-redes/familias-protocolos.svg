<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Familias de protocolos</title>
  <desc id="desc">Diagrama comparativo entre familia TCP/IP, modelo OSI y protocolos usados en aplicaciones web.</desc>
  <rect width="1100" height="620" fill="#f6f8fb"/>
  <rect x="70" y="64" width="960" height="492" rx="8" fill="#ffffff" stroke="#d8dee8"/>
  <rect x="70" y="64" width="960" height="64" rx="8" fill="#172033"/>
  <text x="110" y="104" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Familias de protocolos y referencia de capas</text>

  <rect x="120" y="172" width="390" height="274" rx="8" fill="#eef6ff" stroke="#b8d8f4"/>
  <text x="150" y="220" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#18324a">Familia TCP/IP</text>
  <text x="150" y="260" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">IP: direccionamiento y enrutamiento</text>
  <text x="150" y="296" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">TCP: entrega confiable</text>
  <text x="150" y="332" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">UDP: transmisión rápida</text>
  <text x="150" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">HTTP/HTTPS: comunicación web</text>
  <text x="150" y="404" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">DNS: nombres de dominio</text>

  <rect x="590" y="172" width="390" height="274" rx="8" fill="#f3fbf7" stroke="#b8dfc8"/>
  <text x="620" y="220" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#166534">Modelo OSI</text>
  <text x="620" y="260" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Aplicación, presentación y sesión</text>
  <text x="620" y="296" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Transporte y red</text>
  <text x="620" y="332" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Enlace de datos y física</text>
  <text x="620" y="368" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Referencia conceptual por capas</text>
  <text x="620" y="404" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Ayuda a analizar la comunicación</text>

  <rect x="150" y="480" width="800" height="46" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
  <text x="185" y="510" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Artify se entiende mejor relacionando HTTP/HTTPS con las capas de aplicación y transporte.</text>
</svg>
