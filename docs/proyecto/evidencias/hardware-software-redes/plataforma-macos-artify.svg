<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Plataforma macOS para alistamiento de Artify</title>
  <desc id="desc">Diagrama que diferencia macOS como entorno técnico de trabajo y Artify como aplicación web multiplataforma.</desc>
  <rect width="1100" height="620" fill="#f6f8fb"/>
  <rect x="70" y="64" width="960" height="492" rx="8" fill="#ffffff" stroke="#d8dee8"/>
  <rect x="70" y="64" width="960" height="64" rx="8" fill="#172033"/>
  <text x="110" y="104" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Plataforma seleccionada para la evidencia</text>

  <rect x="120" y="178" width="370" height="236" rx="8" fill="#eef6ff" stroke="#b8d8f4"/>
  <text x="150" y="226" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#18324a">macOS</text>
  <text x="150" y="266" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#34495e">Entorno de trabajo técnico</text>
  <text x="150" y="304" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Node.js, pnpm, Git y MySQL</text>
  <text x="150" y="340" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Terminal y navegador moderno</text>
  <text x="150" y="376" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Pruebas locales y alistamiento</text>

  <path d="M520 296 H608" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="640" y="178" width="340" height="236" rx="8" fill="#f3fbf7" stroke="#b8dfc8"/>
  <text x="670" y="226" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#166534">Artify Web</text>
  <text x="670" y="266" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#34495e">Aplicación accesible por navegador</text>
  <text x="670" y="304" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Usuario final: macOS, Windows o Linux</text>
  <text x="670" y="340" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">No requiere instalación nativa</text>
  <text x="670" y="376" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#34495e">Depende de conectividad y navegador</text>

  <rect x="120" y="456" width="860" height="56" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
  <text x="150" y="491" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">macOS se selecciona para preparar el entorno; Artify se consume como aplicación web multiplataforma.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
